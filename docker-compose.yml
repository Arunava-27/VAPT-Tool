services:
  # =============================================================================
  # Data Layer Services
  # =============================================================================
  
  postgres:
    image: postgres:15-alpine
    container_name: vapt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vapt_platform}
      POSTGRES_USER: ${POSTGRES_USER:-vapt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vapt_user} -d ${POSTGRES_DB:-vapt_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vapt-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    networks:
      - backend-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: vapt-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend-network
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: vapt-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=vapt-cluster
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - data-network
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: vapt-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    networks:
      - data-network
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # =============================================================================
  # Secrets Management — HashiCorp Vault
  # =============================================================================

  vault:
    image: hashicorp/vault:1.17
    container_name: vapt-vault
    hostname: vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK          # required — prevents secrets being swapped to disk
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_API_ADDR: http://vault:8200
      VAULT_CLUSTER_ADDR: http://vault:8201
    command: vault server -config=/vault/config/vault.hcl
    volumes:
      - vault_data:/vault/file            # encrypted secrets (persistent)
      - ./vault/config:/vault/config:ro   # server config
    ports:
      - "8200:8200"
    networks:
      - backend-network
      - data-network
    healthcheck:
      # vault status exits 0 only when initialized AND unsealed
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 30         # high retries — vault-init needs time to unseal
      start_period: 15s

  vault-init:
    image: hashicorp/vault:1.17
    container_name: vapt-vault-init
    restart: "no"         # one-shot: runs on every compose up, then exits
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_SKIP_VERIFY: "true"
      # Credentials for seeding secrets
      POSTGRES_DB: ${POSTGRES_DB:-vapt_platform}
      POSTGRES_USER: ${POSTGRES_USER:-vapt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL:-admin@vapt-platform.local}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD:-Admin@123}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: ["sh", "/vault/scripts/init.sh"]
    volumes:
      - vault_init_data:/vault/init       # unseal keys + tokens (persistent)
      - ./vault/scripts:/vault/scripts:ro # init script (read-only)
    networks:
      - backend-network
    depends_on:
      vault:
        condition: service_started        # start once vault container is up

  # =============================================================================
  # Core Services
  # =============================================================================

  data-layer-init:
    build:
      context: ./data-layer
      dockerfile: Dockerfile
    container_name: vapt-data-init
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vapt_user}:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/${POSTGRES_DB:-vapt_platform}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - ./api-gateway/alembic:/app/alembic
      - ./api-gateway/alembic.ini:/app/alembic.ini
    networks:
      - backend-network
      - data-network
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: "no"
    profiles:
      - init
      - api

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: vapt-api-gateway
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vapt_user}:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/${POSTGRES_DB:-vapt_platform}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - SECRET_KEY=${JWT_SECRET_KEY:-supersecretkey-changeme}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-supersecretkey-changeme}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:5173}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AI_ENGINE_URL=http://ai-engine:8001
      - SUPERUSER_EMAIL=${SUPERUSER_EMAIL:-}
      - SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD:-}
    volumes:
      - ./api-gateway:/app
    networks:
      - frontend-network
      - backend-network
      - data-network
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - api

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: vapt-orchestrator
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vapt_user}:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/${POSTGRES_DB:-vapt_platform}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./orchestrator:/app
    networks:
      - backend-network
      - data-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - orchestrator

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: vapt-ai-engine
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vapt_user}:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/${POSTGRES_DB:-vapt_platform}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/2
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=rpc://
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-haiku-20240307}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-true}
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-}
      - LLM_FALLBACK_CHAIN=${LLM_FALLBACK_CHAIN:-ollama}
      - MAX_AGENT_ITERATIONS=${MAX_AGENT_ITERATIONS:-10}
      - AGENT_TIMEOUT_SECONDS=${AGENT_TIMEOUT_SECONDS:-300}
      - GUARDRAILS_ENABLED=${GUARDRAILS_ENABLED:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./ai-engine:/app
    networks:
      - backend-network
      - data-network
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - ai

  # Optional: Local LLM server (Ollama) — free, fully private, air-gapped
  ollama:
    image: ollama/ollama:latest
    container_name: vapt-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend-network
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    profiles:
      - ai
      - local-llm

  # Pulls the default model into Ollama on first run (runs once, exits)
  ollama-init:
    image: curlimages/curl:latest
    container_name: vapt-ollama-init
    entrypoint: >
      sh -c "
        echo '>>> Waiting for Ollama to be ready...' &&
        sleep 5 &&
        echo '>>> Pulling llama3.2 model (this may take several minutes on first run)...' &&
        curl -sf http://ollama:11434/api/pull -d '{\"name\":\"llama3.2\"}' --max-time 600 &&
        echo '>>> llama3.2 model ready!'
      "
    networks:
      - backend-network
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    profiles:
      - ai
      - local-llm

  # =============================================================================
  # Worker Services (Security Tools)
  # =============================================================================

  worker-nmap:
    build:
      context: ./workers/nmap
      dockerfile: Dockerfile
    container_name: vapt-worker-nmap
    command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info", "--concurrency=4", "-Q", "nmap"]
    environment:
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@localhost:5672/
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis123}@localhost:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vapt_user}:${POSTGRES_PASSWORD:-changeme123}@localhost:5432/${POSTGRES_DB:-vapt_platform}
      - MINIO_ENDPOINT=localhost:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./workers/nmap/app:/app/app
      - ./workers/base:/app/base
    network_mode: "host"
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import app.tasks\" || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - SYS_PTRACE
    profiles:
      - workers

  worker-zap:
    build:
      context: ./workers/zap
      dockerfile: Dockerfile
    container_name: vapt-worker-zap
    command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info", "--concurrency=2", "-Q", "zap"]
    environment:
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=rpc://
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - ZAP_PORT=${ZAP_PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./workers/zap/app:/app/app
      - ./workers/base:/app/base
    networks:
      - backend-network
      - scan-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import app.tasks\" || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    profiles:
      - workers

  worker-trivy:
    build:
      context: ./workers/trivy
      dockerfile: Dockerfile
    container_name: vapt-worker-trivy
    command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info", "--concurrency=2", "-Q", "trivy"]
    environment:
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=rpc://
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./workers/trivy/app:/app/app
      - ./workers/base:/app/base
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend-network
      - scan-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import app.tasks\" || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    profiles:
      - workers

  worker-prowler:
    build:
      context: ./workers/prowler
      dockerfile: Dockerfile
    container_name: vapt-worker-prowler
    command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info", "--concurrency=1", "-Q", "prowler"]
    environment:
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=rpc://
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./workers/prowler/app:/app/app
      - ./workers/base:/app/base
    networks:
      - backend-network
      - scan-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import app.tasks\" || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    profiles:
      - workers

  worker-metasploit:
    build:
      context: ./workers/metasploit
      dockerfile: Dockerfile
    container_name: vapt-worker-metasploit
    command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info", "--concurrency=1", "-Q", "metasploit"]
    environment:
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=rpc://
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./workers/metasploit/app:/app/app
      - ./workers/base:/app/base
    networks:
      - backend-network
      - scan-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import app.tasks\" || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    privileged: true
    profiles:
      - workers

  # =============================================================================
  # Frontend
  # =============================================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time — nginx proxies /api/ and /api/v1/ws/
        VITE_API_BASE_URL: ""
        VITE_WS_BASE_URL: ""
    container_name: vapt-frontend
    networks:
      - frontend-network
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    profiles:
      - frontend

  # =============================================================================
  # Monitoring (Optional)
  # =============================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: vapt-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - backend-network
    ports:
      - "9090:9090"
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: vapt-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend-network
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

# =============================================================================
# Networks
# =============================================================================

networks:
  frontend-network:
    driver: bridge
    name: vapt-frontend-network
  
  backend-network:
    driver: bridge
    name: vapt-backend-network
    internal: false  # Set to true for air-gapped mode
  
  data-network:
    driver: bridge
    name: vapt-data-network
    internal: true
  
  scan-network:
    driver: bridge
    name: vapt-scan-network
    internal: false  # Workers need internet for scanning targets

# =============================================================================
# Volumes
# =============================================================================

volumes:
  postgres_data:
    name: vapt-postgres-data
  
  redis_data:
    name: vapt-redis-data
  
  rabbitmq_data:
    name: vapt-rabbitmq-data
  
  elasticsearch_data:
    name: vapt-elasticsearch-data
  
  minio_data:
    name: vapt-minio-data
  
  ollama_data:
    name: vapt-ollama-data

  vault_data:
    name: vapt-vault-data           # encrypted Vault storage (persists across restarts/deletions)

  vault_init_data:
    name: vapt-vault-init-data      # unseal keys & tokens (KEEP THIS VOLUME — losing it = losing vault access)
  
  prometheus_data:
    name: vapt-prometheus-data
  
  grafana_data:
    name: vapt-grafana-data
